<style>
  :root{
    --bg:#0a0a0e; --panel:#111118; --ink:#e7e7ef; --dim:#8b8b99;
    --src:#40dcd2; --voice:#a08ac6; --env:#eb785f; --mix:#969ea8;
    --pat:#c8a03c; --shared:#78cd5f;
    --focusbg:#2a1015; --rail:#d65460; --pill:#408cdc; --pillink:#06223e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#05050a;color:var(--ink);
       font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;padding:18px 16px 60px}
  h1{font-size:15px;margin:0 0 2px;letter-spacing:.4px}
  .sub{color:var(--dim);font-size:12px;margin:0 0 14px}
  .tabs,.enrow{display:flex;gap:6px;flex-wrap:wrap}
  .tabs{margin-bottom:10px} .enrow{margin-bottom:12px}
  .tab,.en{padding:6px 11px;background:var(--panel);border:1px solid #23232e;color:var(--dim);
       border-radius:6px;cursor:pointer;font-size:12px;user-select:none}
  .tab.on{background:#1d2740;border-color:var(--pill);color:#cfe3ff}
  .en{padding:4px 9px;font-size:11px}
  .en.on{background:#10302c;border-color:var(--src);color:#bdeee9}
  .wrap{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap}
  #dev{width:960px;height:640px;background:var(--bg);border:1px solid #20202c;border-radius:8px;
       position:relative;outline:none;overflow:hidden}
  #dev:focus{border-color:#3a3a55}
  .scr{position:absolute;inset:0;transform-origin:top left;transform:scale(2);width:480px;height:320px}
  .hdr{position:absolute;left:0;top:0;width:480px;height:13px;background:#15151c;
       display:flex;align-items:center;padding:0 6px;color:#7f7f8d;font-size:8px;gap:8px}
  .subhdr{position:absolute;left:0;top:14px;width:480px;height:13px;display:flex;align-items:center;
          padding:0 6px;color:#8a8a98;font-size:8px;gap:6px}
  .body{position:absolute;left:0;top:30px;right:0;bottom:0}
  .vline{position:absolute;width:1px;background:#52526a}
  .badge{position:absolute;font-size:7px;color:#6f86c8}
  .dock{position:absolute;left:0;bottom:0;width:480px;height:50px;border-top:1px solid #1c1c26}
  .foot{position:absolute;left:0;bottom:0;width:480px;height:11px;background:#0d0d13;
        color:#6f6f7d;font-size:7px;display:flex;align-items:center;justify-content:flex-end;
        padding:0 6px;gap:9px}
  .legend{flex:1 1 320px;min-width:300px;color:#c7c7d2;font-size:13px;line-height:1.5}
  .legend h3{font-size:13px;margin:0 0 6px;color:#fff}
  .legend .k{display:inline-block;background:#1a1a24;border:1px solid #2b2b38;border-radius:4px;
             padding:0 6px;font-size:11px;color:#cfe3ff;margin:0 2px}
  .legend ul{margin:6px 0 12px;padding-left:18px}.legend li{margin:4px 0}
  .cap{color:#9a9aa8;font-size:12px;margin-top:10px;max-width:940px;line-height:1.5}
  .hint{color:#6f6f7d;font-size:11px;margin-top:6px}
</style>

<h1>Sinchelles ENGINE — rich SOURCE · category nav · macro rows</h1>
<p class="sub">click the screen, then drive with the keyboard. engine buttons switch the sound. <span style="color:#5a5a68">· build 2026-06-22e (macro meter on normal foldout + macro page)</span></p>

<script>
const COL={SRC:'var(--src)',VOICE:'var(--voice)',ENV:'var(--env)',MIX:'var(--mix)',PAT:'var(--pat)',SHARED:'var(--shared)'};
// faithful per-engine catalog (pulled from track_rows.cpp). src = grouped SOURCE rows.
const EN={
 sampler:{name:'SAMPLER',src:[
   {nm:'SOURCE',f:[['BANK','1 Drive'],['STRCH','Clean'],['RATE','1.00'],['PITCH','=RATE'],['SCRUB','0.00']]},
   {nm:'',f:[['START','0%'],['LEN','100%'],['LOOP','OFF'],['DIR','FWD']]}],
   voice:[['SEMI','0 st'],['GAIN','0 dB']],
   env:[['ATK','1 ms'],['SUS','1.00'],['FALL','100 ms'],['CURVE','-2.0'],['EMPH','0%']],
   mix:[['VOL','100%'],['PAN','C'],['DJF','0.00'],['COMP','0%'],['DUCK','0%']],
   pat:[['LEN','1.00'],['STEPS','16'],['RES','1/16'],['PROB','100%'],['SWING','0%']]},
 miplaits:{name:'MIPLAITS',src:[
   {nm:'SOURCE',f:[['MODEL','Vosim'],['HARM','0.68'],['TIMBRE','0.42'],['MORPH','0.51']]},
   {nm:'TONE',f:[['LEVEL','0.85'],['COLOR','0.33'],['AUX','0.20']]}],
   voice:[['FMOD','+0.45'],['TMOD','-0.12'],['MMOD','0.00'],['PDECAY','0.67'],['SEMI','0 st']],
   env:[['ATK','5 ms'],['SUS','1.00'],['FALL','350 ms'],['CURVE','-2.0'],['ADAPT','0.0']],
   mix:[['VOL','95%'],['PAN','C'],['DJF','+0.05'],['COMP','0%'],['DUCK','0%']],
   pat:[['LEN','1.00'],['STEPS','8'],['RES','1/16'],['PROB','100%'],['HUM','0%']]},
 wave:{name:'WAVE',rich:true,src:[
   {nm:'OSC A',f:[['OSC A','Triangle'],['SCAN','0.50']]},
   {nm:'OSC B',f:[['OSC B','Sine'],['SCAN','0.25']]},
   {nm:'BLEND',f:[['MORPH','0.45'],['RING','0.30'],['B.SEMI','+12'],['CENT','+30'],['SYNC','0.75']]},
   {nm:'FILTER',f:[['CUT','0.65'],['RES','0.40'],['MODE','LP'],['FOLD','0.20'],['DRIVE','0.55']]},
   {nm:'F.ENV',f:[['F.AMT','0.80'],['F.ATK','0.05'],['F.DEC','0.35'],['F.SUS','0.50'],['F.REL','0.40']]}],
   voice:[['SEMI','0 st'],['VOICES','3'],['DETUNE','0.15'],['UNISON','0.42'],['WIDTH','0.60']],
   env:[['ATK','10 ms'],['SUS','0.75'],['FALL','450 ms'],['CURVE','-1.5'],['EMPH','0%']],
   mix:[['LEVEL','0.80'],['MIX','0.50'],['SUB','0.25'],['SUBOCT','-1'],['VOL','0 dB']],
   pat:[['LEN','16'],['STEPS','16'],['RES','1/16'],['PROB','100%'],['HUM','0%']]},
 bd:{name:'DRUM',src:[
   {nm:'SOURCE',f:[['FREQ','85Hz'],['PAMT','4.50x'],['PDEC','0.15s'],['DECAY','0.45s'],['MIX','0.68']]},
   {nm:'',f:[['DRIVE','2.30'],['CLICK','0.35'],['TONE','SIN BR'],['SHAPE','FOLD']]}],
   voice:[['SEMI','0 st'],['JITTER','0.00'],['HUM','0%'],['ACCEL','1.00'],['LEGATO','OFF']],
   env:[['ATK','5ms'],['SUS','0.00'],['FALL','0.35s'],['CURVE','-2.0'],['MORPH','0.00']],
   mix:[['DJF','+0.00'],['COMP','1:1'],['VOL','100%'],['PAN','C'],['GAIN','+0 dB']],
   pat:[['LEN','1.00'],['STEPS','16'],['RES','1/16'],['PROB','100%'],['SWING','50%']]},
 grow:{name:'GROW',src:[
   {nm:'SOURCE',f:[['SHAPE','0.34'],['BRGHT','0.52'],['STRCH','1.00'],['FOLD','0.18'],['FM','3.50']]},
   {nm:'',f:[['WIDTH','0.25'],['FAN','0.50'],['DRIVE','0.42']]}],
   voice:[['SEMI','0 st'],['GLIDE','OFF'],['JITTER','0.00'],['ATK','1 ms'],['SUS','0.80']],
   env:[['FALL','0.35 s'],['CURVE','-2.0'],['MORPH','0%'],['ADAPT','0%'],['TARGET','KEYS']],
   mix:[['DJF','0.00'],['COMP','0%'],['VOL','80%'],['PAN','C'],['DUCK','0%']],
   pat:[['LEN','2.00'],['STEPS','16'],['RES','1/16'],['PROB','100%'],['HUM','0%']]},
 ditto:{name:'DITTO',rich:true,dual:true,src:[
   {nm:'VOICE A',col:COL.SHARED,f:[['SHP.A','SIN'],['TON.A','0.45'],['GRN.A','0.50'],['ZAP.A','0.30'],['DEC.A','0.35']]},
   {nm:'VOICE B',col:COL.SHARED,f:[['SHP.B','TRI'],['TON.B','0.55'],['GRN.B','0.48'],['ZAP.B','0.25'],['DEC.B','0.40']]},
   {nm:'SHARED',col:COL.SHARED,f:[['B.SEMI','+12'],['LINK','OFF'],['XFM','0.00'],['SEMI','0 st'],['GLIDE','OFF']]}],
   env:[['ATK','5 ms'],['SUS','0.50'],['FALL','200 ms'],['CURVE','0.0'],['MORPH','0.00']],
   mix:[['VOL','0 dB'],['PAN','C'],['COMP','0%'],['MIX','0%'],['DUCK','OFF']],
   pat:[['LEN','1/4'],['STEPS','1'],['PROB','100%'],['HUM','0%'],['SWING','0%']]},
};
// macros (idea 3): the EASY in-line layer. each macro = a BIPOLAR offset (-/0/+,
// center = no effect) over several real params 'that make sense'. tg maps a param
// label -> weight. SOURCE macros are engine-aware; tail macros are generic.
// names chosen to hint at the params each macro moves (not abstract mood words)
const SRCM={
 sampler:[{nm:'WINDOW',tg:{START:0.7,LEN:-0.4}},{nm:'SPEED',tg:{RATE:0.5,SCRUB:0.6}},{nm:'TUNE',tg:{PITCH:0.5,STRCH:0.4}},{nm:'REPLAY',tg:{LOOP:0.7,DIR:0.5}}],
 miplaits:[{nm:'HARMON',tg:{HARM:0.6,TIMBRE:0.6}},{nm:'SHADE',tg:{MORPH:0.7,COLOR:0.5}},{nm:'OUTPUT',tg:{LEVEL:0.5,AUX:0.6}},{nm:'AUX MIX',tg:{AUX:0.5,COLOR:0.4}}],
 wave:[{nm:'OPEN',tg:{CUT:0.7,MORPH:0.4,SCAN:0.3}},{nm:'CLANG',tg:{RING:0.5,SYNC:0.5}},{nm:'WEIGHT',tg:{SUB:0.6,RES:0.4}},{nm:'DIRT',tg:{DRIVE:0.6,FOLD:0.5}}],
 bd:[{nm:'SWEEP',tg:{PAMT:0.7,PDEC:-0.4}},{nm:'TIMBRE',tg:{TONE:0.6,SHAPE:0.5}},{nm:'BOOM',tg:{DECAY:0.6,DRIVE:0.5}},{nm:'SNAP',tg:{CLICK:0.6,PDEC:-0.3}}],
 grow:[{nm:'SHEEN',tg:{BRGHT:0.7,FOLD:0.4}},{nm:'SWARM',tg:{FM:0.6,FAN:0.5}},{nm:'GROWL',tg:{SHAPE:0.5,DRIVE:0.5}},{nm:'SPREAD',tg:{WIDTH:0.6,STRCH:0.4}}],
 ditto:[{nm:'VOICE A',tg:{'TON.A':0.6,'ZAP.A':0.4}},{nm:'VOICE B',tg:{'TON.B':0.6,'ZAP.B':0.4}},{nm:'CROSS',tg:{XFM:0.7,'B.SEMI':0.4}},{nm:'GRAINS',tg:{'GRN.A':0.5,'GRN.B':0.5}}],
};
// hybrid: a 2-LINE budget of the most important raw SOURCE params kept inline under
// the macros (first 5 = row 1, next up-to-5 = row 2). foldout still has everything.
const KEY10={
 sampler:['BANK','STRCH','RATE','PITCH','SCRUB','START','LEN','LOOP','DIR'],
 miplaits:['MODEL','HARM','TIMBRE','MORPH','LEVEL','COLOR','AUX'],
 wave:['OSC A','OSC B','MORPH','CUT','RES','DRIVE','FOLD','RING','SYNC','F.AMT'],
 bd:['FREQ','PAMT','PDEC','DECAY','MIX','DRIVE','CLICK','TONE','SHAPE'],
 grow:['SHAPE','BRGHT','STRCH','FOLD','FM','WIDTH','FAN','DRIVE'],
 ditto:['SHP.A','TON.A','SHP.B','TON.B','XFM','GRN.A','ZAP.A','GRN.B','ZAP.B','B.SEMI'],
};
const TAILM={
 VOICE:[{nm:'TONE',tg:{SEMI:0.5,GLIDE:0.4}},{nm:'BODY',tg:{GAIN:0.5,WIDTH:0.5}}],
 ENV:[{nm:'SNAP',tg:{ATK:-0.6,FALL:-0.5}},{nm:'SHAPE',tg:{SUS:0.6,CURVE:0.5}}],
 MIX:[{nm:'LEVEL',tg:{VOL:0.6}},{nm:'COLOR',tg:{DJF:0.6,COMP:0.5}}],
 PATTERN:[{nm:'GRID',tg:{STEPS:0.5,RES:0.5}},{nm:'FEEL',tg:{PROB:-0.4,SWING:0.6}}],
};
const macroState={}, baseOff={};      // macro values (-100..100) + per-param foldout base edits
const mkey=(e,s,i)=>e+'|'+s+'|'+i;
const macroVal=(e,s,i)=>macroState[mkey(e,s,i)]||0;
const macroDisp=(e,s,i)=>{const v=macroVal(e,s,i);return v===0?'·':(v>0?'+'+v:''+v);};

const COLW=81, FX0=66, NAMEX=10, ROWH=14;
let tab='layout', eng='wave', sec=0, fld=0, open=-1;
let macroPageOpen=-1; // ENTER on a macro -> the macro PAGE (editor), NOT a foldout (Tim)
let pfld=0;   // foldout param cursor
let pickOpen=null, pickIdx=0;   // full-screen picker (wavetable / model / stretch / bank)
// rows that OWN enter in the real app: ENTER opens their picker, NOT the foldout
// (input_track.cpp openTrackRowEnterAction). everything else falls through to foldout.
const PICK={
 wave:{'OSC A':{t:'WAVETABLE · OSC A',items:['Triangle','Sine','Saw','Square','Vox Ahh','Bell','Metallic','Formant','PWM','Gritty','Reso','Digital','— IMPORTED —','vocal_chop.wt','glass_pad.wt']},
       'OSC B':{t:'WAVETABLE · OSC B',items:['Sine','Triangle','Saw','Square','Vox Ahh','Bell','Metallic','Formant','PWM','Gritty','Reso','Digital']}},
 miplaits:{'MODEL':{t:'MODEL',items:['Virtual Analog','Waveshaping','2-op FM','Granular','Harmonic','Wavetable','Chord','Speech / Vosim','Swarm','Filt. Noise','Particle','Inharm. String','Modal','Bass Drum','Snare','Hi-Hat']}},
 sampler:{'BANK':{t:'SAMPLE BROWSER',items:['1 Drive','2 Vinyl','3 Choir','4 Rhodes','5 808','6 Field','7 Foley','8 Tape','▸ /breaks','▸ /oneshots']},
          'STRCH':{t:'STRETCH MODE',items:['Clean (Warp1)','Signalsmith','RubberBand R3','Repitch','Grain']}},
}
function pickerFor(e,label){return (PICK[e]||{})[label]||null;}
function focLabel(s){if(!s||s.isMacro||!s.rows)return '';const r=s.rows[0]||[];return (r[Math.min(fld,r.length-1)]||[''])[0];}

function tailSecs(E){
  const t=[];
  if(!E.dual) t.push({key:'VOICE',col:COL.VOICE,rows:[E.voice]});
  t.push({key:'ENV',col:COL.ENV,rows:[E.env]});
  t.push({key:'MIX',col:COL.MIX,rows:[E.mix]});
  t.push({key:'PATTERN',col:COL.PAT,rows:[E.pat]});
  return t;
}
function sections(){
  const E=EN[eng];
  if(tab==='macro'){
    // ONLY SOURCE is macro-ized (Tim): a single row of easy macros; params[] is the
    // full real source list shown in the foldout. Every other section is a normal
    // lean param row, exactly like the layout tab.
    const srcParams=E.src.flatMap(g=>g.f);
    const srcMac={key:'SOURCE', col:E.dual?COL.SHARED:COL.SRC, macros:SRCM[eng], params:srcParams,
                  isMacro:true, rows:[SRCM[eng].map((m,i)=>[m.nm, macroDisp(eng,'SOURCE',i)])]};
    return [srcMac, ...tailSecs(E)];
  }
  if(tab==='hybrid'){
    // SOURCE = a row of 4 macros (easy) PLUS a 2-LINE budget of the most important raw
    // params (direct). ENTER on any of them opens the full grouped SOURCE foldout.
    const srcParams=E.src.flatMap(g=>g.f);
    const col=E.dual?COL.SHARED:COL.SRC;
    const macRow={key:'SOURCE', col, macros:SRCM[eng], params:srcParams, isMacro:true,
                  rows:[SRCM[eng].map((m,i)=>[m.nm, macroDisp(eng,'SOURCE',i)])]};
    const keys=KEY10[eng]||[];
    const res=lbl=>srcParams.find(f=>f[0]===lbl)||[lbl,'—'];
    const out=[macRow];
    [keys.slice(0,5), keys.slice(5,10)].forEach(r=>{
      if(r.length)out.push({key:'', col, params:srcParams, srcFold:true, rows:[r.map(res)]});
    });
    return [...out, ...tailSecs(E)];
  }
  const srcSecs=E.src.map((g,i)=>({key:g.nm||'', col:g.col||COL.SRC, rows:[g.f], src:true, first:i===0}));
  return [...srcSecs, ...tailSecs(E)];
}
// fixed Ctrl-category chords (idea 2). returns target section index or -1.
function ctrlTarget(dir){
  const s=sections();
  const find=k=>s.findIndex(x=>x.key===k);
  if(dir==='up')   return 0;                 // SOURCE / first engine row
  if(dir==='down') return find('PATTERN');
  if(dir==='left') return find('ENV');
  if(dir==='right')return find('MIX');
  return -1;
}
function chordFor(si){ // badge text for a section in CTRL-NAV
  const s=sections();
  if(si===0) return '⌃↑';
  if(s[si].key==='PATTERN') return '⌃↓';
  if(s[si].key==='ENV') return '⌃←';
  if(s[si].key==='MIX') return '⌃→';
  return '';
}

function el(c,css){const d=document.createElement('div');d.className=c||'';if(css)d.style.cssText=css;return d;}
function cellW(f){return f[0].length*5+5 + (''+f[1]).length*5;}
function render(){
  const scr=document.getElementById('scr');scr.innerHTML='';
  const E=EN[eng];
  const hdr=el('hdr');hdr.innerHTML=`<span style="color:#cfe3ff">T1</span> ${E.name} &rsaquo; PAT A &rsaquo; ENGINE`;
  const hr=el('','position:absolute;right:6px;color:#7f7f8d');hr.textContent='120 BPM';hdr.appendChild(hr);scr.appendChild(hdr);
  const sh=el('subhdr');sh.innerHTML=`<span style="color:${COL.SRC}">${E.name}</span> <span style="color:#6f6f7d">engine voice</span>`;scr.appendChild(sh);
  const body=el('body');scr.appendChild(body);
  const secs=sections();
  // the picker (wavetable/model/stretch/browser) IS a full-screen modal in the real
  // app; the FOLDOUT is NOT — it expands INLINE (accordion) with the other sections
  // still visible above/below. (Tim 2026-06-22: don't model the foldout as a subpage.)
  if(pickOpen){renderPicker(body);footer(body);return;}
  // ENTER on a macro opens the MACRO PAGE (editor), a full page like the real app —
  // NOT a foldout. The foldout (below) is the ONE normal param foldout; macro offsets
  // show as the blue meter on its bars, not as a separate macro foldout. (Tim 2026-06-22)
  if(macroPageOpen>=0){renderMacroPage(body,macroPageOpen);footer(body);return;}
  const expanded = open;   // -1 when nothing expanded
  // SOURCE is split across several "sections" (layout: one per group; hybrid: macro
  // row + 2 param rows) but is logically ONE section: when any SOURCE part is
  // expanded, the whole SOURCE foldout replaces ALL of them (rendered once).
  const srcFam = x => !!(x.src||x.isMacro||x.srcFold);
  const expandedSrc = expanded>=0 && srcFam(secs[expanded]);
  let y=2, srcDone=false;
  secs.forEach((s,si)=>{
    if(srcFam(s)){
      if(expandedSrc){ if(!srcDone){ y=drawExpandedSource(body,y)+2; srcDone=true; } return; }
      drawCollapsedRow(body,s,si,y, expanded<0 && si===sec, expanded<0); y+=ROWH; return;
    }
    if(si===expanded){ y=drawExpandedTail(body,s,y)+2; return; }
    drawCollapsedRow(body,s,si,y, expanded<0 && si===sec, expanded<0); y+=ROWH;
  });
  if(expanded<0)body.appendChild(el('vline','left:'+(FX0-5)+'px;top:0;height:'+y+'px'));
  const dock=el('dock');dock.appendChild(el('','position:absolute;right:8px;top:4px;color:#8a8a98;font-size:8px')).textContent='AMP ENV';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('viewBox','0 0 150 24');
  svg.setAttribute('style','position:absolute;left:300px;top:18px;width:150px;height:24px');
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d','M2 22 L40 4 L92 4 L130 22');
  p.setAttribute('fill','none');p.setAttribute('stroke','#6d6dba');p.setAttribute('stroke-width','1.2');svg.appendChild(p);dock.appendChild(svg);
  if(tab==='macro'||tab==='hybrid')toneBars(dock);
  body.appendChild(dock);footer(body);
}
// one collapsed section row (inline view): name + up to 5 fields + ctrl badge + ▸ markers
function drawCollapsedRow(body,s,si,y,focused,showBadge){
  const fields=s.rows[0];
  if(focused){body.appendChild(el('','position:absolute;left:0;top:'+y+'px;width:480px;height:14px;background:var(--focusbg)'));
              body.appendChild(el('','position:absolute;left:2px;top:'+y+'px;width:4px;height:14px;background:var(--rail)'));}
  if(s.key){const nm=el('','position:absolute;left:'+NAMEX+'px;top:'+(y+3)+'px;font-size:8px;color:'+s.col+';'+(focused?'':'opacity:.8'));nm.textContent=s.key;body.appendChild(nm);}
  if(showBadge){const ch=chordFor(si);if(ch){const b=el('badge','left:456px;top:'+(y+3)+'px');b.textContent=ch;body.appendChild(b);}}
  fields.forEach((f,ci)=>{
    const x=colX(ci), ff=focused&&ci===Math.min(fld,fields.length-1);
    if(ff)body.appendChild(el('','position:absolute;left:'+(x-3)+'px;top:'+(y+2)+'px;height:11px;width:'+(cellW(f)+6)+'px;background:var(--pill);border-radius:1px'));
    const lab=el('','position:absolute;left:'+x+'px;top:'+(y+3)+'px;font-size:8px;color:'+(ff?'var(--pillink)':s.col)+';'+(ff?'':(focused?'opacity:.85':'opacity:.45')));
    lab.textContent=f[0];body.appendChild(lab);
    const lw=f[0].length*5+5;
    const val=el('','position:absolute;left:'+(x+lw)+'px;top:'+(y+3)+'px;font-size:8px;color:'+(ff?'var(--pillink)':(focused?'#dfe2ea':'#7e7e8c')));
    val.textContent=f[1];body.appendChild(val);
    if(!s.isMacro&&pickerFor(eng,f[0])){const vw=(''+f[1]).length*5+4;const g=el('','position:absolute;left:'+(x+lw+vw)+'px;top:'+(y+3)+'px;font-size:8px;color:'+(ff?'var(--pillink)':'#6f86c8'));g.textContent='▸';body.appendChild(g);}
  });
}
// SOURCE expanded INLINE (accordion): one identity header, then ALL source params
// grouped + 2-col when long. The ONE normal foldout — macro offsets show as the blue
// meter on the bars (drawSourceParams), there is no separate "macro foldout".
function drawExpandedSource(body,yStart){
  body.appendChild(el('','position:absolute;left:0;top:'+yStart+'px;width:480px;height:13px;background:#18101e'));

function foldGroups(s){
  if(s.src) return EN[eng].src.map(g=>({nm:g.nm||'',col:g.col||COL.SRC,f:g.f}));
  return [{nm:'',col:s.col,f:s.rows.flat()}];

function tag(c,css,txt){const d=el(c,css);d.textContent=txt;return d;}
function pbase(i){return 20+((i*43)%62);}  // deterministic base fill % per param
// SOURCE macro contribution to a param, summed over the engine's SOURCE macros
function paramOffset(label){let o=0;SRCM[eng].forEach((m,i)=>{const w=m.tg[label];if(w)o+=macroVal(eng,'SOURCE',i)*w;});return o;}
function srcGroups(){return EN[eng].src.map(g=>({nm:g.nm||'',col:g.col||COL.SRC,f:g.f}));}
// group-major split into 1 or 2 columns. matches the LIVE app's 2-column foldout
// (track_rows.h kV3FoldoutTwoColMin: >12 open params -> 2 cols) but keeps whole
// groups together so the sub-category headers stay coherent (the live app is
// column-major + category colour, no headers — this is the grouped variant).
function packGroups(groups){
  const total=groups.reduce((n,g)=>n+g.f.length,0);
  if(total<=12) return [groups];
  const half=Math.ceil(total/2); let k=0,acc=0;
  for(let i=0;i<groups.length;i++){const n=groups[i].f.length; if(k>0&&acc+n>half)break; acc+=n;k=i+1;}
  k=Math.max(1,Math.min(k,groups.length-1));
  return [groups.slice(0,k),groups.slice(k)];
}
function colHeight(g){return g.reduce((a,x)=>a+(x.nm?10:0)+x.f.length*11,0);}
// SOURCE params expanded INLINE starting at yTop (accordion, not a subpage): grouped,
// with the live 2-column split when long. macro=true layers the macro offsets (blue +/
// red -) + editable %; macro=false shows raw values. Returns the y below the block.
function drawSourceParams(body,macro,yTop){
  const groups=srcGroups(), total=groups.reduce((n,g)=>n+g.f.length,0);
  const cols=packGroups(groups), two=cols.length===2, colW=two?234:468;
  const fc=Math.min(macro?pfld:fld,total-1);
  let idx=0, maxY=yTop;
  cols.forEach((cg,ci)=>{
    const x=two?(ci===0?4:242):6; let y=yTop;
    cg.forEach(g=>{
      if(g.nm){groupHeader(body,x,colW,y,g.nm,g.col);y+=10;}
      g.f.forEach(f=>{
        const mi=idx, foc=fc===mi, barX=x+74, barW=colW-126;
        if(foc)body.appendChild(el('','position:absolute;left:'+x+'px;top:'+y+'px;width:'+colW+'px;height:11px;background:rgba(214,84,96,.16)'));
        body.appendChild(tag('','position:absolute;left:'+(x+8)+'px;top:'+(y+2)+'px;font-size:8px;color:'+g.col+';opacity:.92',f[0]));
        if(pickerFor(eng,f[0]))body.appendChild(tag('','position:absolute;left:'+(x+8+f[0].length*5+2)+'px;top:'+(y+2)+'px;font-size:8px;color:#6f86c8','▸'));
        body.appendChild(el('','position:absolute;left:'+barX+'px;top:'+(y+4)+'px;width:'+barW+'px;height:4px;background:#1b1b24;border-radius:2px'));
        // Macro-offset meter (Tim 2026-06-22): drawn on the SAME normal-foldout bars,
        // NOT a separate macro foldout. Mirrors the amber LFO/auto meter
        // (drawModPreviewMeter) but in BLUE — a base tick (what the param is set to),
        // a range outline (the macro's reach, from->to) and a bright head (where the
        // macro currently sits). Shows for ANY macro-moved param in ANY foldout;
        // plain bar + value otherwise.
        let thr=0; SRCM[eng].forEach(m=>{const w=m.tg[f[0]];if(w)thr+=Math.abs(w)*100;});
        const shown=Math.max(2,Math.min(100,pbase(mi)+(baseOff[eng+'|SOURCE|'+mi]||0)));
        const px=v=>barX+Math.max(0,Math.min(100,v))/100*barW;
        if(thr>0.5){ // macro target -> blue meter
          const mp=Math.max(-shown,Math.min(100-shown,paramOffset(f[0])));
          const baseX=px(shown), curX=px(shown+mp), rL=px(shown-thr), rR=px(shown+thr);
          body.appendChild(el('','position:absolute;left:'+rL+'px;top:'+(y+2)+'px;width:'+Math.max(2,rR-rL)+'px;height:7px;border:1px solid rgba(95,155,235,.55);background:rgba(95,155,235,.10);border-radius:1px'));
          body.appendChild(el('','position:absolute;left:'+barX+'px;top:'+(y+4)+'px;width:'+Math.max(0,baseX-barX)+'px;height:4px;background:#3a4a5e;border-radius:2px'));
          if(mp>0.5)body.appendChild(el('','position:absolute;left:'+baseX+'px;top:'+(y+4)+'px;width:'+(curX-baseX)+'px;height:4px;background:#4f9cf0;border-radius:2px'));
          else if(mp<-0.5)body.appendChild(el('','position:absolute;left:'+curX+'px;top:'+(y+4)+'px;width:'+(baseX-curX)+'px;height:4px;background:#e2748a;border-radius:2px'));
          body.appendChild(el('','position:absolute;left:'+baseX+'px;top:'+(y+2)+'px;width:1px;height:7px;background:#cfe0ff'));
          body.appendChild(el('','position:absolute;left:'+(curX-1)+'px;top:'+(y+1)+'px;width:2px;height:9px;background:#7fb6ff'));
          const tv=Math.round(Math.max(0,Math.min(100,shown+mp)))+'%', vc=foc?'#fff':(mp>0.5?'#9fc4ec':(mp<-0.5?'#e2a0a8':'#cfcfda'));
          body.appendChild(tag('','position:absolute;left:'+(x+colW-4-tv.length*5)+'px;top:'+(y+2)+'px;font-size:8px;color:'+vc,tv));
        } else {
          const v=''+f[1];
          body.appendChild(el('','position:absolute;left:'+barX+'px;top:'+(y+4)+'px;width:'+(px(shown)-barX)+'px;height:4px;background:#3a6ea0;border-radius:2px'));
          body.appendChild(tag('','position:absolute;left:'+(x+colW-4-v.length*5)+'px;top:'+(y+2)+'px;font-size:8px;color:'+(foc?'#fff':'#cfcfda'),v));
        }
        idx++; y+=11;
      });
    });
    if(y>maxY)maxY=y;
  });
  if(two)body.appendChild(el('vline','left:240px;top:'+yTop+'px;height:'+(maxY-yTop)+'px'));
  return maxY;
}
// spectral 'tone' preview driven by SOURCE macros — sells inline shaping (macro tab)
function toneBars(body){
  const n=10, x0=8, w=14, gap=2, top=8, h=34;
  const m=SRCM[eng].map((_,i)=>macroVal(eng,'SOURCE',i)/100);
  const a=m[0]||0,b=m[1]||0,c=m[2]||0;
  for(let i=0;i<n;i++){const t=i/(n-1);
    let v=0.42 + a*0.42*t + c*0.42*(1-t) + b*0.16*Math.sin(i*1.25);
    v=Math.max(0.06,Math.min(1,v));const bh=v*h;
    body.appendChild(el('','position:absolute;left:'+(x0+i*(w+gap))+'px;top:'+(top+(h-bh))+'px;width:'+w+'px;height:'+bh+'px;background:'+COL.SRC+';opacity:.55;border-radius:1px'));
  }
  body.appendChild(tag('','position:absolute;left:8px;top:'+(top+h+2)+'px;font-size:7px;color:#6f6f7d','TONE  (moves with SOURCE macros)'));
}

function isWS(k){return k==='w'||k==='W'||k==='s'||k==='S';}
function onKey(e){
  const k=e.key,ctrl=e.ctrlKey||e.metaKey,secs=sections();
  if(pickOpen){const pk=pickerFor(eng,pickOpen),n=pk?pk.items.length:0;
    if(k==='ArrowDown')pickIdx=Math.min(n-1,pickIdx+1);
    else if(k==='ArrowUp')pickIdx=Math.max(0,pickIdx-1);
    else if(k==='Enter'||k==='Escape'||k==='ArrowLeft')pickOpen=null;
    e.preventDefault();render();return;}
  if(macroPageOpen>=0){ // macro PAGE (editor): pick a target route; ESC/Left/Enter back
    const n=Object.keys(SRCM[eng][macroPageOpen].tg).length;
    if(k==='Escape'||k==='ArrowLeft'||k==='Enter')macroPageOpen=-1;
    else if(k==='ArrowDown')pfld=Math.min(n,pfld+1);   // n = the +assign row
    else if(k==='ArrowUp')pfld=Math.max(0,pfld-1);
    e.preventDefault();render();return;
  }
  if(open>=0){ // the ONE normal foldout: param bars (macro offsets shown as the meter)
    const s=secs[open], isSrc=!!(s.src||s.isMacro||s.srcFold);
    const total=isSrc?srcGroups().reduce((a,g)=>a+g.f.length,0):s.rows.flat().length;
    if(k==='Escape'||k==='ArrowLeft'||k==='Enter'){open=-1;e.preventDefault();render();return;}
    if(k==='ArrowDown'){fld=Math.min(total-1,fld+1);e.preventDefault();render();return;}
    if(k==='ArrowUp'){fld=Math.max(0,fld-1);e.preventDefault();render();return;}
    if(isWS(k)&&isSrc){const key=eng+'|SOURCE|'+fld;baseOff[key]=Math.max(-40,Math.min(40,(baseOff[key]||0)+((k==='w'||k==='W')?6:-6)));e.preventDefault();render();return;}
    return;
  }
  if(ctrl&&k.startsWith('Arrow')){const t=ctrlTarget(k.slice(5).toLowerCase());if(t>=0){sec=t;fld=0;}e.preventDefault();render();return;}
  // MACRO tab: plain W/S shapes the focused SOURCE macro inline (bipolar, center=off)
  if(isWS(k)&&secs[sec].isMacro){const s=secs[sec];const i=Math.min(fld,s.macros.length-1);
    const key=mkey(eng,s.key,i);macroState[key]=Math.max(-100,Math.min(100,(macroState[key]||0)+((k==='w'||k==='W')?10:-10)));
    e.preventDefault();render();return;}
  if(k==='ArrowDown'){sec=Math.min(secs.length-1,sec+1);fld=Math.min(fld,nF(secs[sec])-1);e.preventDefault();render();return;}
  if(k==='ArrowUp'){sec=Math.max(0,sec-1);fld=Math.min(fld,nF(secs[sec])-1);e.preventDefault();render();return;}
  if(k==='ArrowRight'){fld=Math.min(nF(secs[sec])-1,fld+1);e.preventDefault();render();return;}
  if(k==='ArrowLeft'){if(fld===0){openFold();}else fld--;e.preventDefault();render();return;}
  if(k==='Enter'){const lbl=focLabel(secs[sec]);if(pickerFor(eng,lbl)){pickOpen=lbl;pickIdx=0;}else openFold();e.preventDefault();render();return;}
}
function nF(s){return s.isMacro?s.macros.length:s.rows[0].length;}

  else open=sec;}                                                        // param/section -> foldout

  const dev=document.getElementById('dev');dev.addEventListener('keydown',onKey);dev.addEventListener('click',()=>dev.focus());
  const q=new URLSearchParams(location.search);
  if(q.get('eng')&&EN[q.get('eng')]){eng=q.get('eng');document.querySelectorAll('.en').forEach(x=>x.classList.toggle('on',x.dataset.e===eng));}
  setTab(['layout','macro','hybrid'].includes(q.get('tab'))?q.get('tab'):'layout');
  if(q.get('sec'))sec=+q.get('sec'); if(q.get('fld'))fld=+q.get('fld');
  if(q.get('open')==='1'||q.get('macro')==='1'){open=sec;fld=+(q.get('pfld')||0);} // foldout (one kind now)
  if(q.get('mpage')!==null&&q.get('mpage')!==undefined&&q.get('mpage')!==''){macroPageOpen=+q.get('mpage');pfld=0;} // macro page demo
  q.getAll('mv').forEach(s=>{const [sk,i,v]=s.split(',');macroState[mkey(eng,sk,+i)]=+v;}); // demo preset
  if(q.get('pick')&&pickerFor(eng,q.get('pick'))){pickOpen=q.get('pick');pickIdx=+(q.get('pidx')||0);} // demo picker
  render();
})();
</script>
